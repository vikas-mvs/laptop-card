<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
    <title>AXL CodeX - HP Laptop Buy</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            gap: 5px;
        }
        body{
            width: 100vh;
            height: 100vh;
            display: grid;
            place-content: center;
            background-color: lightyellow;
        }
        .card {
            width: 400px;
            height: 500px;
            background: lightgreen;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 2px 2px 20px 2px green;
        }
        img{
            width: 100%;
            border-radius: 10px;
        }
        p {
            background: skyblue;
            padding: 15px;
            font-size: 26px;
            border-radius: 10px;
        }

        .price-link{
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
        }

        .price {
            background-color: rgb(58, 58, 255);
            padding: 10px 30px;
            font-weight: bold;
            font-size: 30px;
            border-radius: 10px;
        }

        button {
            background: rgb(255, 78, 255);
            border: none;
            padding: 10px 10px;
            cursor: pointer;
            font-size: 30px;
            border-radius: 10px;
        }
        button:hover{
            box-shadow: 2px 2px 10px 2px purple;
        }

    </style>
</head>
<body>
        <div class="card">
  <img src="HP Laptop.png" alt="Laptop">
  
  <h1>HP Notebook Laptop</h1>
  <p>This is a good Laptop</p>
  
  <div class="price-link">
    <p class="price">44,999</p>
    <button>BUY NOW</button>
  </div>
</div>
</body>
</html>
